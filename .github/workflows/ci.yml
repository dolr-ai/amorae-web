name: CI

# Mirrors yral-rishi-agent/.github/workflows/ci.yml. amorae has no infra/
# dir, so lint targets app/ only. Security scans (gitleaks/pip-audit/trivy)
# live in security.yml; Codex review in codex-review.yml — same split as v2.
#
# ORG NOTE: image path is ghcr.io/dolr-ai/amorae-web pending Rishi's Q1
# (same org vs a separate adult-brand org). If a separate org is chosen,
# this is a find-replace of `dolr-ai` across ci.yml + security.yml +
# deploy.yml + rollback.yml + docker-compose*.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/
      - run: ruff format --check app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: PYTHONPATH=app pytest tests/ -v
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/dolr-ai/amorae-web:${{ github.sha }}
            ghcr.io/dolr-ai/amorae-web:latest
